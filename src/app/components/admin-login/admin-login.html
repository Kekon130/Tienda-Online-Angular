@if (!store.adminLogged()) {
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="mb-4">Acceso administrador</h5>
          <div class="mb-3">
            <label class="form-label"> Contraseña </label>
            <input type="password" class="form-control" [(ngModel)]="password" />
          </div>
          <button class="btn btn-primary w-100" (click)="store.login(password)">Entrar</button>
        </div>
      </div>
    </div>
  </div>
}
